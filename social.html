<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Hub – Arcidiacono Interactive</title>

<style>
body {
  margin: 0;
  padding: 0;
  background: #000;
  color: #f5f5f5;
  font-family: "Montserrat", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  overflow-x: hidden;
}

/* Grana */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image: url("https://www.transparenttextures.com/patterns/asfalt-dark.png");
  opacity: 0.10;
  z-index: 1;
}

/* Vignettatura */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: radial-gradient(circle, rgba(0,0,0,0) 0%, rgba(0,0,0,0.75) 70%);
  z-index: 2;
}

/* MENU FISSO */
.top-menu {
  position: fixed;
  top: 20px;
  right: 30px;
  z-index: 9999;
  display: flex;
  gap: 22px;
}

.top-menu a {
  font-size: 0.78rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #ffffff;
  opacity: 0.55;
  text-decoration: none;
  transition: opacity 0.25s ease;
}

.top-menu a:hover {
  opacity: 1;
}

/* Wrapper */
.social-wrapper {
  position: relative;
  z-index: 3;
  max-width: 900px;
  margin: 0 auto;
  padding: 120px 20px 60px;
  line-height: 1.7;
}

/* TITOLI CENTRATI */
.social-title,
.social-subtitle {
  text-align: center;
}

.social-title {
  font-size: 1.4rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin-bottom: 6px;
  opacity: 0;
  animation: fadeIn 1.2s ease-out forwards;
}

.social-subtitle {
  font-size: 0.9rem;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: #aaaaaa;
  opacity: 0;
  animation: fadeIn 1.2s ease-out forwards;
  animation-delay: 0.3s;
}

/* Link Social */
.social-list {
  margin-top: 60px;
  display: flex;
  flex-direction: column;
  gap: 28px;
  opacity: 0;
  animation: fadeIn 1.4s ease-out forwards;
  animation-delay: 0.6s;
}

.social-item a {
  color: #ffffff;
  text-decoration: none;
  font-size: 1rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  opacity: 0.65;
  transition: opacity 0.25s ease;
}

.social-item a:hover {
  opacity: 1;
}

@keyframes fadeIn {
  to { opacity: 1; }
}
</style>
</head>

<body>

<!-- MENU PRINCIPALE -->
<div class="top-menu">
  <a href="about.html">ABOUT</a>
  <a href="gamepage.html">GAME</a>
  <a href="devlog.html">DEVLOG</a>
  <a href="social.html">SOCIAL</a>
</div>

<div class="social-wrapper">

  <div class="social-title">SOCIAL HUB</div>
  <div class="social-subtitle">Rimani connesso</div>

  <div class="social-list">

    <div class="social-item">
      <a href="#" target="_blank">Instagram</a>
    </div>

    <div class="social-item">
      <a href="#" target="_blank">YouTube</a>
    </div>

    <div class="social-item">
      <a href="#" target="_blank">TikTok</a>
    </div>

    <div class="social-item">
      <a href="#" target="_blank">Twitter / X</a>
    </div>

    <div class="social-item">
      <a href="#" target="_blank">Discord</a>
    </div>

    <div class="social-item">
      <a href="#" target="_blank">Steam (in arrivo)</a>
    </div>

  </div>

</div>

</body>
</html>
