<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcidiacono Interactive</title>

    <style>
        /* RESET */
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: "Montserrat", sans-serif;
            overflow: hidden;
        }

        /* GRANA CINEMATOGRAFICA */
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image: url('https://i.imgur.com/8fK4h7v.png');
            opacity: 0.08;
            mix-blend-mode: overlay;
        }

        /* LOGO IN ALTO */
        .logoTop {
            position: absolute;
            top: 6vh;
            left: 50%;
            transform: translateX(-50%);
        }

        .logoImg {
            width: 210px;
            filter: drop-shadow(0 0 6px rgba(200, 40, 40, 0.45));
            opacity: 0;
            animation: fadeInLogo 2.2s ease forwards;
        }

        /* PULSANTE CENTRALE */
        .enterWrapper {
            position: absolute;
            top: 55vh;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            animation: fadeInButton 3s ease forwards;
        }

        .enterButton {
            display: inline-block;
            padding: 14px 42px;
            font-size: 1.1rem;
            letter-spacing: 0.15rem;
            color: #fff;
            border: 2px solid rgba(200, 40, 40, 0.8);
            background: transparent;
            text-decoration: none;
            transition: 0.25s ease;
            text-shadow: 0 0 6px rgba(200, 40, 40, 0.35);
            box-shadow: 0 0 12px rgba(200, 40, 40, 0.25);
            animation: pulseButton 3.2s ease-in-out infinite;
        }

        /* HOVER */
        .enterButton:hover {
            box-shadow: 0 0 18px rgba(200, 40, 40, 0.55);
            text-shadow: 0 0 10px rgba(200, 40, 40, 0.55);
            transform: scale(1.03);
        }

        /* ANIMAZIONI */
        @keyframes fadeInLogo {
            0% { opacity: 0; transform: translateY(-8px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInButton {
            0% { opacity: 0; transform: translateX(-50%) translateY(12px); }
            100% { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        @keyframes pulseButton {
            0%   { box-shadow: 0 0 10px rgba(200, 40, 40, 0.25); }
            50%  { box-shadow: 0 0 18px rgba(200, 40, 40, 0.45); }
            100% { box-shadow: 0 0 10px rgba(200, 40, 40, 0.25); }
        }
    </style>
</head>

<body>

    <!-- LOGO IN ALTO -->
    <div class="logoTop">
         <img src="AI_logotipo_ArcidiaconoInteractive_v02.svg?v=1" alt="Arcidiacono Interactive Logo" class="logoImg">
    </div>

    <!-- PULSANTE CENTRALE -->
    <div class="enterWrapper">
        <a href="pagina2_omega_final.html" class="enterButton">ENTER THE WORLD</a>
    </div>

</body>
</html>
