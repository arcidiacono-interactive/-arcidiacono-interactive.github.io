<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Arcidiacono Interactive — QR Reveal</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #000;
        color: #fff;
        font-family: 'Anton', sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }

    #qrcode {
        margin-bottom: 90px; /* distanza di sicurezza */
    }

    #glitch-text {
        font-size: 80px;
        color: #f23a34;
        letter-spacing: 2px;
        position: relative;
        text-align: center;
        text-shadow:
            2px 0 #f23a34,
            -2px 0 #f23a34,
            0 0 18px rgba(242, 58, 52, 0.55),
            0 0 32px rgba(242, 58, 52, 0.35);
        animation: flicker 2.2s infinite alternate;
    }

    /* Glitch layers */
    #glitch-text::before,
    #glitch-text::after {
        content: "ARE YOU READY?";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        overflow: hidden;
        color: #f23a34;
        opacity: 0.35;
        clip-path: inset(0 0 0 0);
        animation: glitch 1.8s infinite ease-in-out alternate-reverse;
    }

    #glitch-text::before {
        text-shadow: -3px 0 #ff4a4a;
        transform: translate(3px, -2px);
    }

    #glitch-text::after {
        text-shadow: 3px 0 #c02020;
        transform: translate(-3px, 2px);
        animation-delay: 0.25s;
    }

    /* Animazione glitch */
    @keyframes glitch {
        0% { clip-path: inset(0 0 0 0); transform: translate(0, 0); }
        20% { clip-path: inset(10% 0 40% 0); transform: translate(-3px, -2px); }
        40% { clip-path: inset(80% 0 5% 0); transform: translate(3px, 2px); }
        60% { clip-path: inset(30% 0 20% 0); transform: translate(-2px, 1px); }
        80% { clip-path: inset(60% 0 30% 0); transform: translate(2px, -1px); }
        100% { clip-path: inset(0 0 0 0); transform: translate(0, 0); }
    }

    /* Animazione flicker leggero */
    @keyframes flicker {
        0% { opacity: 1; }
        50% { opacity: 0.85; }
        100% { opacity: 1; }
    }
</style>
</head>

<body>

<div id="qrcode"></div>
<div id="glitch-text">ARE YOU READY?</div>

<!-- Libreria QRCode.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
new QRCode(document.getElementById("qrcode"), {
    text: "https://arcidiacono-interactive.github.io",
    width: 1024,
    height: 1024,
    colorDark: "#f23a34",
    colorLight: "#000000",
    correctLevel: QRCode.CorrectLevel.H
});
</script>

</body>
</html>
