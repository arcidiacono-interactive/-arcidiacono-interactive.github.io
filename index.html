<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">

    <!-- ANTI-CACHE -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcidiacono Interactive</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #f5f5f5;
            font-family: "Montserrat", sans-serif;
            text-align: center;
            overflow: hidden;
        }

        .logo {
            opacity: 0;
            margin-top: 28vh;
            font-size: 2.8rem;
            letter-spacing: 2px;
            animation: fadeIn 2.2s ease forwards;
        }

        .enter-btn {
            opacity: 0;
            margin-top: 3rem;
            display: inline-block;
            font-size: 1.2rem;
            padding: 0.6rem 1.4rem;
            border: 1px solid #f5f5f5;
            text-decoration: none;
            color: #f5f5f5;
            letter-spacing: 1px;
            transition: 0.3s ease;
        }

        .enter-btn:hover {
            background: #f5f5f5;
            color: #000;
        }

        .fade-late {
            animation: fadeLate 3.4s ease forwards;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeLate {
            0% { opacity: 0; transform: translateY(10px); }
            60% { opacity: 0; }
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

    <div class="logo">ARCIDIACONO INTERACTIVE</div>

    <!-- ENTER THE WORLD -->
    <a href="pagina2_omega_final.html" class="enter-btn fade-late">ENTER THE WORLD</a>

</body>
</html>
