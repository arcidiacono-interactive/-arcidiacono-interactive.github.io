<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcidiacono Interactive</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #f5f5f5;
            font-family: "Montserrat", sans-serif;
            text-align: center;
            overflow-x: hidden;
            position: relative;
        }

        /* MICRO-GRANA CINEMATOGRAFICA */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: url('https://i.imgur.com/8fK4h7v.png');
            opacity: 0.08;
            mix-blend-mode: overlay;
        }

        /* ANIMAZIONI */
        .fade-in {
            opacity: 0;
            animation: fadeIn 1.8s ease forwards;
        }

        .fade-late {
            opacity: 0;
            animation: fadeIn 1.8s ease forwards;
            animation-delay: 1.2s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* GLOW ROSSO LEGGERISSIMO */
        .logo-glow {
            filter: drop-shadow(0 0 6px rgba(214, 40, 40, 0.35));
        }

        /* BOTTONE ENTER */
        .enter-btn {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 28px;
            border: 2px solid #d62828;
            color: #d62828;
            text-decoration: none;
            font-size: 1.1rem;
            letter-spacing: 1px;
            transition: 0.3s ease;
        }

        .enter-btn:hover {
            background: #d62828;
            color: #000;
            box-shadow: 0 0 12px #d62828;
            transform: scale(1.05);
        }

        header {
            padding: 20px 0;
        }
    </style>
</head>

<body>

    <!-- HEADER MINIMALE (NO MENU) -->
    <header>
        <h1 class="fade-in" style="font-size: 1.4rem; letter-spacing: 2px; color: #d62828;">
            ARCIDIACONO INTERACTIVE
        </h1>
    </header>

    <!-- LOGO -->
    <img src="AI_logotipo_ArcidiaconoInteractive_v01.svg"
         alt="Logo Arcidiacono Interactive"
         class="fade-in logo-glow"
         style="width: 180px; margin-top: 40px; animation-delay: 0.4s;">

    <!-- SOTTOTITOLO -->
    <p class="fade-in" style="margin-top: 20px; font-size: 1.1rem; opacity: 0.85; animation-delay: 0.6s;">
        Sito ufficiale in costruzione.
    </p>

    <!-- ENTER THE WORLD -->
    <a href="pagina2.html" class="enter-btn fade-late">ENTER THE WORLD</a>

</body>
</html>
