<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcidiacono Interactive</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #f5f5f5;
            font-family: "Montserrat", sans-serif;
            text-align: center;
            overflow-x: hidden;
            position: relative;
        }

        /* MICRO-GRANA CINEMATOGRAFICA */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: url('https://i.imgur.com/8fK4h7v.png');
            opacity: 0.08;
            mix-blend-mode: overlay;
        }

        /* ANIMAZIONI MORBIDE */
        .fade-in {
            opacity: 0;
            transform: translateY(3px);
            animation: fadeInSoft 2s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
        }

        .fade-mid {
            opacity: 0;
            transform: translateY(3px);
            animation: fadeInSoft 2s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
            animation-delay: 0.4s;
        }

        .fade-late {
            opacity: 0;
            transform: translateY(4px);
            animation: fadeInSoft 2s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
            animation-delay: 1.2s;
        }

        @keyframes fadeInSoft {
            from {
                opacity: 0;
                transform: translateY(3px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* GLOW ROSSO LEGGERISSIMO */
        .logo-glow {
            filter: drop-shadow(0 0 6px rgba(214, 40, 40, 0.35));
        }

        /* BOTTONE ENTER */
        .enter-btn {
            display: inline-block;
            margin-top: 38px; /* leggermente più basso per micro-asimmetria */
            padding: 14px 32px;
            border: 2px solid #d62828;
            color: #d62828;
            text-decoration: none;
            font-size: 1.2rem;
            letter-spacing: 1px;
            transition: 0.3s ease;
            transform: scale(0.98);
        }

        .enter-btn:hover {
            background: #d62828;
            color: #000;
            box-shadow: 0 0 12px #d62828;
            transform: scale(1.03);
        }

        header {
            padding: 22px 0; /* leggermente più alto */
        }
    </style>
</head>

<body>

    <!-- HEADER MINIMALE (NO MENU) -->
    <header>
        <h1 class="fade-in" style="font-size: 1.55rem; letter-spacing: 2px; color: #d62828;">
            ARCIDIACONO INTERACTIVE
        </h1>
    </header>

    <!-- LOGO -->
    <img src="AI_logotipo_ArcidiaconoInteractive_v01.svg"
         alt="Logo Arcidiacono Interactive"
         class="fade-mid logo-glow"
         style="width: 200px; margin-top: 42px;">

    <!-- ENTER THE WORLD -->
    <a href="pagina2.html" class="enter-btn fade-late">ENTER THE WORLD</a>

</body>
</html>
