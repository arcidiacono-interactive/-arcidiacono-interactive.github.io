<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcidiacono Interactive</title>

    <style>
        /* RESET */
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: "Montserrat", sans-serif;
            overflow: hidden;
        }

        /* GRANA CINEMATOGRAFICA */
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image: url('https://i.imgur.com/8fK4h7v.png');
            opacity: 0.08;
            mix-blend-mode: overlay;
        }

        /* ========================= */
        /*     ANIMAZIONI GLOBALI    */
        /* ========================= */

        @keyframes fadeInLogo {
            0% { opacity: 0; transform: translateY(-8px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInText {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInButton {
            0% { opacity: 0; transform: translateX(-50%) translateY(12px); }
            100% { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* PULSAZIONE UNIFICATA (3.2s) */
        @keyframes pulseLogoCombined {
            0% {
                filter:
                    drop-shadow(0 0 7px rgba(200, 40, 40, 0.50))
                    drop-shadow(0 0 5px rgba(0, 140, 255, 0.20));
            }
            50% {
                filter:
                    drop-shadow(0 0 14px rgba(200, 40, 40, 0.80))
                    drop-shadow(0 0 9px rgba(0, 140, 255, 0.30));
            }
            100% {
                filter:
                    drop-shadow(0 0 7px rgba(200, 40, 40, 0.50))
                    drop-shadow(0 0 5px rgba(0, 140, 255, 0.20));
            }
        }

        @keyframes pulseTextAura {
            0%   { text-shadow: 0 0 5px rgba(0, 140, 255, 0.20); }
            50%  { text-shadow: 0 0 9px rgba(0, 140, 255, 0.32); }
            100% { text-shadow: 0 0 5px rgba(0, 140, 255, 0.20); }
        }

        @keyframes pulseButton {
            0%   { box-shadow: 0 0 10px rgba(200, 40, 40, 0.25); }
            50%  { box-shadow: 0 0 18px rgba(200, 40, 40, 0.45); }
            100% { box-shadow: 0 0 10px rgba(200, 40, 40, 0.25); }
        }

        /* ========================= */
        /*     STRUTTURA GENERALE    */
        /* ========================= */

        .logoTop {
            position: absolute;
            top: 6vh;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }

        .logoImg {
            width: 225px; /* leggermente più grande ma non cafone */
            opacity: 0;
            animation:
                fadeInLogo 2.4s ease forwards,
                pulseLogoCombined 3.2s ease-in-out infinite;
        }

        .logoText {
            margin-top: 3px; /* distanza perfetta */
            font-size: 0.95rem;
            letter-spacing: 0.18rem;
            color: #008CFF;
            opacity: 0;
            animation:
                fadeInText 2.4s ease forwards,
                pulseTextAura 3.2s ease-in-out infinite;
            text-shadow: 0 0 6px rgba(0, 140, 255, 0.25);
        }

        .enterWrapper {
            position: absolute;
            top: 55vh;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            animation: fadeInButton 3s ease forwards;
        }

        .enterButton {
            display: inline-block;
            padding: 14px 42px;
            font-size: 1.1rem;
            letter-spacing: 0.15rem;
            color: #fff;
            border: 2px solid rgba(200, 40, 40, 0.8);
            background: transparent;
            text-decoration: none;
            transition: 0.25s ease;
            text-shadow: 0 0 6px rgba(200, 40, 40, 0.35);
            box-shadow: 0 0 12px rgba(200, 40, 40, 0.25);
            animation: pulseButton 3.2s ease-in-out infinite;
        }

        .enterButton:hover {
            box-shadow: 0 0 18px rgba(200, 40, 40, 0.55);
            text-shadow: 0 0 10px rgba(200, 40, 40, 0.55);
            transform: scale(1.03);
        }

    </style>
</head>

<body>

    <!-- LOGO IN ALTO -->
    <div class="logoTop">
        <img src="AI_logo_symbol.svg" class="logoImg" alt="Arcidiacono Interactive Logo">
        <p class="logoText">ARCIDIACONO INTERACTIVE</p>
    </div>

    <!-- PULSANTE CENTRALE -->
    <div class="enterWrapper">
        <a href="pagina2_omega_final.html" class="enterButton">ENTER THE WORLD</a>
    </div>

</body>
</html>
