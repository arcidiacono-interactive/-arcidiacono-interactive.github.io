<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Arcidiacono Interactive — QR Reveal</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #000;
        color: #fff;
        font-family: 'Anton', sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
        text-align: center;
    }

    /* LOGO RESPONSIVE */
    #logo {
        width: 18vw;
        max-width: 180px;
        min-width: 120px;
        margin-bottom: 3vh;
    }

    #logo img {
        width: 100%;
        height: auto;
    }

    /* QR RESPONSIVE */
    #qrcode {
        width: 30vw;
        height: 30vw;
        max-width: 300px;
        max-height: 300px;
        min-width: 180px;
        min-height: 180px;
        margin-bottom: 4vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    #qrcode img, #qrcode canvas {
        width: 100% !important;
        height: 100% !important;
    }

    /* TESTO GLITCH RESPONSIVE */
    #glitch-text {
        font-size: 4vw;
        max-font-size: 50px;
        min-font-size: 28px;
        color: #f23a34;
        letter-spacing: 2px;
        position: relative;
        margin-bottom: 3vh;
        text-shadow:
            2px 0 #f23a34,
            -2px 0 #f23a34,
            0 0 12px rgba(242, 58, 52, 0.55),
            0 0 20px rgba(242, 58, 52, 0.35);
        animation: flicker 2.2s infinite alternate;
    }

    #glitch-text::before,
    #glitch-text::after {
        content: "ARE YOU READY?";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        overflow: hidden;
        color: #f23a34;
        opacity: 0.35;
        clip-path: inset(0 0 0 0);
        animation: glitch 1.8s infinite ease-in-out alternate-reverse;
    }

    #glitch-text::before {
        text-shadow: -3px 0 #ff4a4a;
        transform: translate(3px, -2px);
    }

    #glitch-text::after {
        text-shadow: 3px 0 #c02020;
        transform: translate(-3px, 2px);
        animation-delay: 0.25s;
    }

    @keyframes glitch {
        0% { clip-path: inset(0 0 0 0); transform: translate(0, 0); }
        20% { clip-path: inset(10% 0 40% 0); transform: translate(-3px, -2px); }
        40% { clip-path: inset(80% 0 5% 0); transform: translate(3px, 2px); }
        60% { clip-path: inset(30% 0 20% 0); transform: translate(-2px, 1px); }
        80% { clip-path: inset(60% 0 30% 0); transform: translate(2px, -1px); }
        100% { clip-path: inset(0 0 0 0); transform: translate(0, 0); }
    }

    @keyframes flicker {
        0% { opacity: 1; }
        50% { opacity: 0.85; }
        100% { opacity: 1; }
    }

    /* BOTTONE RESPONSIVE */
    #enter-btn {
        font-size: 2.2vw;
        max-font-size: 26px;
        min-font-size: 18px;
        padding: 1.2vh 3vw;
        border: 2px solid #f23a34;
        color: #f23a34;
        background: transparent;
        cursor: pointer;
        letter-spacing: 2px;
        transition: 0.25s;
    }

    #enter-btn:hover {
        background: #f23a34;
        color: #000;
        box-shadow: 0 0 20px #f23a34;
    }

    /* MOBILE FIX */
    @media (max-width: 600px) {
        #glitch-text {
            font-size: 28px;
        }
        #enter-btn {
            font-size: 18px;
        }
    }
</style>
</head>

<body>

<div id="logo">
    <img src="AI_logo_symbol.svg" alt="Arcidiacono Interactive">
</div>

<div id="qrcode"></div>

<div id="glitch-text">ARE YOU READY?</div>

<button id="enter-btn" onclick="location.href='pagina2_omega_final.html'">ENTER THE WORLD</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
new QRCode(document.getElementById("qrcode"), {
    text: "https://arcidiacono-interactive.github.io",
    width: 1024,
    height: 1024,
    colorDark: "#f23a34",
    colorLight: "#000000",
    correctLevel: QRCode.CorrectLevel.H
});
</script>

</body>
</html>
