<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Arcidiacono Interactive</title>

    <!-- Font professionale -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background: #0a0a0a;
            color: #eee;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            animation: fadeInBody 1.5s ease forwards;
            opacity: 0;
        }

        @keyframes fadeInBody {
            to { opacity: 1; }
        }

        img {
            width: 160px;
            margin-bottom: 25px;
            opacity: 0;
            animation: fadeInLogo 1.8s ease forwards;
            filter: drop-shadow(0 0 12px #e63946aa);
        }

        @keyframes fadeInLogo {
            0% { opacity: 0; transform: translateY(-20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2.6rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
            opacity: 0;
            animation: fadeInText 2.2s ease forwards;
        }

        p {
            font-size: 1.1rem;
            opacity: 0;
            animation: fadeInText 2.8s ease forwards;
        }

        .line {
            width: 90px;
            height: 3px;
            background: #e63946;
            margin: 20px 0;
            opacity: 0;
            animation: fadeInText 2.5s ease forwards;
        }

        @keyframes fadeInText {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Pulsante ENTER THE WORLD */
        .enter-btn {
            margin-top: 35px;
            padding: 12px 28px;
            border: 2px solid #e63946;
            color: #e63946;
            text-decoration: none;
            font-size: 1.1rem;
            letter-spacing: 2px;
            border-radius: 4px;
            opacity: 0;
            animation: fadeInText 3.2s ease forwards;
            transition: 0.3s ease;
        }

        .enter-btn:hover {
            background: #e63946;
            color: #0a0a0a;
            box-shadow: 0 0 18px #e63946aa;
            transform: scale(1.05);
        }
    </style>
</head>

<body>
    <img src="AI_logotipo_ArcidiaconoInteractive_v01.svg" alt="Logo Arcidiacono Interactive">

    <h1>Arcidiacono Interactive</h1>
    <div class="line"></div>
    <p>Sito ufficiale in costruzione.</p>

   <a href="pagina2.html" class="enter-btn">ENTER THE WORLD</a>
</body>
</html>
