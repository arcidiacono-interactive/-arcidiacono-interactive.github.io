<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagina 4</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background-color: #000000;
        color: white;
        font-family: "Inter", sans-serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        opacity: 1;
        transition: opacity 1.8s ease;
    }

    .testo {
        opacity: 0;
        font-size: 1.4rem;
        line-height: 1.8;
        text-align: center;
        max-width: 800px;
        padding: 0 20px;
        animation: fadeIn 4s ease forwards;
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    /* Fade-out verso Pagina 5 */
    .fadeout {
        opacity: 0;
    }
</style>

</head>
<body>

<div class="testo">
    “Ti vedo.<br>
    Non come credi di essere,<br>
    ma come sei quando nessuno ti guarda.<br><br>
    C’è un punto in cui hai iniziato a incrinarti.<br>
    Non lo nomini mai,<br>
    ma ogni passo che fai<br>
    ti riporta lì.”
</div>

<script>
    // Attesa → fade-out → redirect alla Pagina 5
    setTimeout(() => {
        document.body.classList.add("fadeout");
        setTimeout(() => {
            window.location.href = "pagina5.html";
        }, 1800); // durata fade-out
    }, 5500); // tempo per leggere la frase prima della transizione
</script>

</body>
</html>
