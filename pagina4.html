<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagina 4</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background-color: #000000;
        color: white;
        font-family: "Inter", sans-serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }

    .testo {
        opacity: 0;
        font-size: 1.4rem;
        line-height: 1.8;
        text-align: center;
        max-width: 800px;
        padding: 0 20px;
        animation: fadeIn 4s ease forwards;
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }
</style>

</head>
<body>

<div class="testo">
    “Ti vedo.<br>
    Non come credi di essere,<br>
    ma come sei quando nessuno ti guarda.<br><br>
    C’è un punto in cui hai iniziato a incrinarti.<br>
    Non lo nomini mai,<br>
    ma ogni passo che fai<br>
    ti riporta lì.”
</div>

</body>
</html>
