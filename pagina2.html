<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">

    <!-- ANTI-CACHE -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina 2</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #f5f5f5;
            font-family: "Montserrat", sans-serif;
            text-align: center;
            overflow-x: hidden;
            position: relative;
        }

        /* MICRO-GRANA */
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image: url('https://i.imgur.com/8fK4h7v.png');
            opacity: 0.08;
            mix-blend-mode: overlay;
        }

        /* CLASSI OMEGA (mai viste prima) */
        .fraseOmega, .fraseOmegaIta {
            opacity: 0;
            transform: translateY(8px);
            animation:
                fadeOmega 3.5s ease forwards,
                pulseOmega 2.6s ease-in-out infinite;
            filter: drop-shadow(0 0 4px rgba(200, 40, 40, 0.22));
        }

        .fraseOmega {
            margin-top: 32vh;
            font-size: 1.85rem;
        }

        .fraseOmegaIta {
            margin-top: 1rem;
            font-size: 1.28rem;
        }

        /* FADE OMEGA (nuovo nome, nuova struttura) */
        @keyframes fadeOmega {
            0%   { opacity: 0; transform: translateY(8px); }
            25%  { opacity: 1; transform: translateY(0); }
            70%  { opacity: 1; }
            100% { opacity: 0; transform: translateY(-8px); }
        }

        /* AURA OMEGA — lenta, sottile, visibile, continua */
        @keyframes pulseOmega {
            0%   { filter: drop-shadow(0 0 3px rgba(200, 40, 40, 0.18)); }
            30%  { filter: drop-shadow(0 0 6px rgba(200, 40, 40, 0.32)); }
            55%  { filter: drop-shadow(0 0 4px rgba(200, 40, 40, 0.22)); }
            80%  { filter: drop-shadow(0 0 7px rgba(200, 40, 40, 0.35)); }
            100% { filter: drop-shadow(0 0 3px rgba(200, 40, 40, 0.20)); }
        }
    </style>

    <script>
        // Redirect automatico dopo 4 secondi
        setTimeout(() => {
            window.location.href = "pagina3.html?v=" + Date.now();
        }, 4000);
    </script>
</head>

<body>

    <div class="fraseOmega">Every story has its fractures.</div>
    <div class="fraseOmegaIta">Ogni storia ha le sue fratture.</div>

</body>
</html>
