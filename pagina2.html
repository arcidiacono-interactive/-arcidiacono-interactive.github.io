<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">

    <!-- ANTI-CACHE -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina 2</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #f5f5f5;
            font-family: "Montserrat", sans-serif;
            text-align: center;
            overflow-x: hidden;
            position: relative;
        }

        /* MICRO-GRANA */
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image: url('https://i.imgur.com/8fK4h7v.png');
            opacity: 0.08;
            mix-blend-mode: overlay;
        }

        /* CLASSI RINOMINATE */
        .fraseX, .fraseItaX {
            opacity: 0;
            transform: translateY(6px);
            animation: fadeInOutX 3.5s ease forwards, auraPulseX 1.9s infinite;
            filter: drop-shadow(0 0 5px rgba(200, 30, 30, 0.25));
        }

        .fraseX {
            margin-top: 32vh;
            font-size: 1.85rem;
        }

        .fraseItaX {
            margin-top: 1rem;
            font-size: 1.28rem;
        }

        /* FADE RINOMINATO */
        @keyframes fadeInOutX {
            0% { opacity: 0; transform: translateY(6px); }
            22% { opacity: 1; transform: translateY(0); }
            70% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-6px); }
        }

        /* AURA ROSSA — VERSIONE X (NUOVO NOME, NUOVI VALORI) */
        @keyframes auraPulseX {
            0%   { filter: drop-shadow(0 0 4px rgba(200, 30, 30, 0.22)); }
            19%  { filter: drop-shadow(0 0 8px rgba(200, 30, 30, 0.40)); }
            33%  { filter: drop-shadow(0 0 5px rgba(200, 30, 30, 0.28)); }
            51%  { filter: drop-shadow(0 0 9px rgba(200, 30, 30, 0.42)); }
            67%  { filter: drop-shadow(0 0 4px rgba(200, 30, 30, 0.24)); }
            84%  { filter: drop-shadow(0 0 7px rgba(200, 30, 30, 0.36)); }
            100% { filter: drop-shadow(0 0 5px rgba(200, 30, 30, 0.30)); }
        }
    </style>

    <script>
        // Redirect automatico dopo 4 secondi
        setTimeout(() => {
            window.location.href = "pagina3.html?v=" + Date.now();
        }, 4000);
    </script>
</head>

<body>

    <div class="fraseX">Every story has its fractures.</div>
    <div class="fraseItaX">Ogni storia ha le sue fratture.</div>

</body>
</html>
