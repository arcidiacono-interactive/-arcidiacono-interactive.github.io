<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagina 2</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background-color: #000000;
        color: white;
        font-family: "Inter", sans-serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        opacity: 1;
        transition: opacity 1.8s ease;
    }

    .frase {
        font-size: 1.6rem;
        line-height: 1.6;
        text-align: center;
        opacity: 0;
        animation: fadeIn 3s ease forwards;
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    /* Fade-out verso Pagina 3 */
    .fadeout {
        opacity: 0;
    }
</style>

</head>
<body>

<div class="frase">
    Every story has its fractures.<br>
    Ogni storia ha le sue fratture.
</div>

<script>
    // Attesa di 3 secondi → fade-out → redirect
    setTimeout(() => {
        document.body.classList.add("fadeout");
        setTimeout(() => {
            window.location.href = "pagina3.html";
        }, 1800); // durata fade-out
    }, 3000); // attesa prima della transizione
</script>

</body>
</html>
