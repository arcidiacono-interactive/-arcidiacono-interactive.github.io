<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">

    <!-- ANTI-CACHE -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina 2</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #f5f5f5;
            font-family: "Montserrat", sans-serif;
            text-align: center;
            overflow-x: hidden;
            position: relative;
        }

        /* MICRO-GRANA */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: url('https://i.imgur.com/8fK4h7v.png');
            opacity: 0.08;
            mix-blend-mode: overlay;
        }

        /* FRASE — SINCRONIZZATE */
        .frase, .frase-ita {
            opacity: 0;
            transform: translateY(4px);
            animation: fadeInOut 3.5s ease forwards, auraPulseV3 1.8s infinite;
            filter: drop-shadow(0 0 5px rgba(198, 40, 40, 0.25));
        }

        .frase {
            margin-top: 32vh;
            font-size: 1.8rem;
            line-height: 1.4;
        }

        .frase-ita {
            margin-top: 1rem;
            font-size: 1.25rem;
        }

        /* FADE IN + OUT */
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(4px); }
            20% { opacity: 1; transform: translateY(0); }
            70% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-4px); }
        }

        /* AURA ROSSA VIVA — VERSIONE V3 (NUOVO NOME) */
        @keyframes auraPulseV3 {
            0%   { filter: drop-shadow(0 0 4px rgba(198, 40, 40, 0.22)); }
            17%  { filter: drop-shadow(0 0 7px rgba(198, 40, 40, 0.38)); }
            31%  { filter: drop-shadow(0 0 5px rgba(198, 40, 40, 0.26)); }
            49%  { filter: drop-shadow(0 0 8px rgba(198, 40, 40, 0.40)); }
            63%  { filter: drop-shadow(0 0 4px rgba(198, 40, 40, 0.24)); }
            82%  { filter: drop-shadow(0 0 6px rgba(198, 40, 40, 0.33)); }
            100% { filter: drop-shadow(0 0 5px rgba(198, 40, 40, 0.28)); }
        }
    </style>

    <script>
        // Redirect automatico dopo 4 secondi
        setTimeout(() => {
            window.location.href = "pagina3.html?v=" + Date.now();
        }, 4000);
    </script>
</head>

<body>

    <div class="frase">Every story has its fractures.</div>
    <div class="frase-ita">Ogni storia ha le sue fratture.</div>

</body>
</html>
