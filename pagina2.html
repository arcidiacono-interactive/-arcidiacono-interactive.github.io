<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">

    <!-- ANTI-CACHE -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina 2</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #f5f5f5;
            font-family: "Montserrat", sans-serif;
            text-align: center;
            overflow-x: hidden;
            position: relative;
        }

        /* MICRO-GRANA CINEMATOGRAFICA */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: url('https://i.imgur.com/8fK4h7v.png');
            opacity: 0.08;
            mix-blend-mode: overlay;
        }

        /* FRASE CENTRALE */
        .frase {
            margin-top: 32vh;
            font-size: 1.8rem;
            line-height: 1.4;
            opacity: 0;
            transform: translateY(4px);
            animation: fadeInSoft 2.4s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
            filter: drop-shadow(0 0 4px rgba(214, 40, 40, 0.18)); /* glow rosso quasi invisibile */
        }

        .frase-ita {
            font-size: 1.25rem;
            opacity: 0;
            transform: translateY(4px);
            animation: fadeInSoft 2.4s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
            animation-delay: 0.8s;
            filter: drop-shadow(0 0 4px rgba(214, 40, 40, 0.15)); /* ancora più leggero */
        }

        @keyframes fadeInSoft {
            from {
                opacity: 0;
                transform: translateY(4px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="frase">Every story has its fractures.</div>
    <div class="frase-ita">Ogni storia ha le sue fratture.</div>

</body>
</html>
