<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">

    <!-- ANTI-CACHE -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina 2 - TEST</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #f5f5f5;
            font-family: "Montserrat", sans-serif;
            text-align: center;
            overflow-x: hidden;
            position: relative;
        }

        .frase {
            margin-top: 32vh;
            font-size: 1.8rem;
            animation: testColor 1s ease forwards;
        }

        .frase-ita {
            font-size: 1.25rem;
            animation: testColor 1s ease forwards;
            animation-delay: 0.3s;
        }

        @keyframes testColor {
            0% { color: #c62828; }
            100% { color: #ffffff; }
        }
    </style>

</head>

<body>

    <div class="frase">Every story has its fractures.</div>
    <div class="frase-ita">Ogni storia ha le sue fratture.</div>

</body>
</html>
