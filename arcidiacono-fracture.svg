<svg xmlns="http://www.w3.org/2000/svg" viewBox="-80 -80 160 160">
  <!-- Sfondo trasparente: perfetta per overlay, poster, UI, ecc. -->

  <!-- Spina dorsale: diagonale A, spessa ma elegante -->
  <g fill="none" stroke="#ff0000" stroke-linecap="round" stroke-linejoin="round">
    <!-- Tratto principale -->
    <path
      d="
        M -55 -55
        L -42 -40
        L -48 -25
        L -32 -12
        L -38 5
        L -22 18
        L -30 32
        L -14 44
        L -20 58
        L -5 68
        L -10 78
        L 8 86
      "
      stroke-width="4.2"
    />

    <!-- Rami principali sinistra (dominante) -->
    <path d="M -42 -40 L -60 -38 L -70 -30" stroke-width="3.2" />
    <path d="M -32 -12 L -50 -8 L -62 2" stroke-width="3.0" />
    <path d="M -22 18 L -40 22 L -55 32" stroke-width="3.0" />
    <path d="M -14 44 L -32 50 L -46 60" stroke-width="3.0" />
    <path d="M -5 68 L -24 74 L -38 84" stroke-width="3.0" />

    <!-- Rami principali destra (forti ma meno estesi) -->
    <path d="M -48 -25 L -34 -30 L -22 -36" stroke-width="3.0" />
    <path d="M -38 5 L -24 0 L -12 -6" stroke-width="2.8" />
    <path d="M -30 32 L -16 28 L -4 22" stroke-width="2.8" />
    <path d="M -20 58 L -6 54 L 6 48" stroke-width="2.8" />

    <!-- Micro-crepe sottili (solo dove servono) -->
    <path d="M -52 -20 L -58 -16 L -64 -12" stroke-width="1.4" />
    <path d="M -44 10 L -50 14 L -56 18" stroke-width="1.4" />
    <path d="M -26 40 L -32 44 L -38 48" stroke-width="1.4" />
    <path d="M -12 62 L -18 66 L -24 70" stroke-width="1.4" />
    <path d="M -30 0 L -36 -4 L -42 -8" stroke-width="1.4" />
    <path d="M -18 24 L -24 20 L -30 16" stroke-width="1.4" />

    <!-- Micro-crepe lato destro, per bilanciare -->
    <path d="M -36 -18 L -28 -22 L -20 -26" stroke-width="1.4" />
    <path d="M -28 14 L -20 10 L -12 6" stroke-width="1.4" />
    <path d="M -22 50 L -14 46 L -6 42" stroke-width="1.4" />
  </g>
</svg>


