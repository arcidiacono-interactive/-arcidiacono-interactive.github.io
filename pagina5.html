<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagina 5</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background-color: #000000;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }

    svg {
        width: 360px;
        height: 360px;
        overflow: visible;
        animation: breathe 3.5s ease-in-out infinite;
    }

    /* Crepe principali, secondarie e micro-crepe */
    .crack-main,
    .crack-branch,
    .crack-noise {
        fill: none;
        stroke: #ff0000;
        stroke-width: 2.2;
        stroke-linecap: round;
        stroke-linejoin: round;
        filter: drop-shadow(0 0 12px rgba(255, 0, 0, 1));
        stroke-dasharray: 600;
        stroke-dashoffset: 600;
        animation: draw 3.6s ease-out forwards;
    }

    .crack-branch {
        stroke-width: 2;
        stroke-dasharray: 300;
        stroke-dashoffset: 300;
        animation: draw 2.8s ease-out forwards;
    }

    .crack-noise {
        stroke-width: 1.2;
        opacity: 0.75;
        stroke-dasharray: 180;
        stroke-dashoffset: 180;
        animation: draw 3s ease-out forwards;
    }

    /* Delays per dare caos controllato */
    .branch-1 { animation-delay: 2.0s; }
    .branch-2 { animation-delay: 2.3s; }
    .branch-3 { animation-delay: 2.6s; }
    .branch-4 { animation-delay: 2.9s; }
    .branch-5 { animation-delay: 3.1s; }

    .noise-1 { animation-delay: 1.2s; }
    .noise-2 { animation-delay: 1.5s; }
    .noise-3 { animation-delay: 1.8s; }
    .noise-4 { animation-delay: 2.0s; }
    .noise-5 { animation-delay: 2.2s; }
    .noise-6 { animation-delay: 2.4s; }
    .noise-7 { animation-delay: 2.6s; }
    .noise-8 { animation-delay: 2.8s; }

    /* Punto di origine */
    .origin-pulse {
        fill: #ff0000;
        filter: drop-shadow(0 0 14px rgba(255, 0, 0, 1));
        animation: pulse 3s infinite ease-in-out;
    }

    /* Animazione disegno */
    @keyframes draw {
        from { stroke-dashoffset: 600; }
        to { stroke-dashoffset: 0; }
    }

    /* Respiro della crepa */
    @keyframes breathe {
        0% { transform: scale(1); }
        50% { transform: scale(1.015); }
        100% { transform: scale(1); }
    }

    /* Pulsazione del nucleo */
    @keyframes pulse {
        0% { transform: scale(1); opacity: 0.6; }
        50% { transform: scale(1.6); opacity: 1; }
        100% { transform: scale(1); opacity: 0.6; }
    }
</style>

</head>
<body>

<svg viewBox="-30 -180 60 360">

    <!-- Punto di origine -->
    <circle class="origin-pulse" cx="0" cy="0" r="0.9" />

    <!-- Crepa principale (molto più aggressiva e seghettata) -->
    <path class="crack-main" d="
        M 0 0
        L 3 -8
        L -4 -16
        L 5 -25
        L -6 -34
        L 4 -44
        L -5 -54
        L 7 -65
        L -7 -76
        L 5 -88
        L -4 -100
        L 7 -113
        L -6 -126
        L 4 -140
        L -3 -155
        L 0 -170

        M 0 0
        L -3 9
        L 4 18
        L -5 28
        L 6 38
        L -4 49
        L 5 60
        L -6 72
        L 4 84
        L -5 97
        L 7 111
        L -6 125
        L 4 140
        L -3 155
        L 0 170
    " />

    <!-- 5 RAMI PRINCIPALI -->
    <path class="crack-branch branch-1" d="M 0 -55 L 7 -60 L 12 -66 L 9 -73 L 15 -80 L 11 -88 L 18 -96" />
    <path class="crack-branch branch-2" d="M 0 60 L -6 66 L -12 72 L -9 79 L -15 87 L -11 95 L -18 103" />
    <path class="crack-branch branch-3" d="M 0 -25 L -5 -30 L -10 -36 L -7 -42 L -13 -49" />
    <path class="crack-branch branch-4" d="M 0 25 L 6 31 L 11 37 L 8 44 L 14 51" />
    <path class="crack-branch branch-5" d="M 0 -95 L 5 -100 L 9 -106 L 6 -112 L 12 -118" />

    <!-- 10 MICRO-CREPE (rumore sporco) -->
    <path class="crack-noise noise-1" d="M 1 -78 L 4 -81 L 0 -84 L 5 -87" />
    <path class="crack-noise noise-2" d="M -2 -130 L -5 -133 L -1 -136 L -4 -139" />
    <path class="crack-noise noise-3" d="M 2 95 L 5 98 L 1 101 L 6 104" />
    <path class="crack-noise noise-4" d="M -1 40 L -4 43 L -1 46 L -3 49" />
    <path class="crack-noise noise-5" d="M 1 -40 L 3 -43 L 0 -46 L 4 -49" />
    <path class="crack-noise noise-6" d="M -2 130 L -5 133 L -1 136 L -4 139" />
    <path class="crack-noise noise-7" d="M 2 -110 L 5 -113 L 1 -116 L 6 -119" />
    <path class="crack-noise noise-8" d="M -1 15 L -3 18 L 0 21 L -2 24" />

</svg>

</body>
</html>
