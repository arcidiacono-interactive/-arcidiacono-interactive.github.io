<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagina 5</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background-color: #000000;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }

    /* Punto di origine */
    .origin {
        width: 3px;
        height: 3px;
        background: red;
        border-radius: 50%;
        position: relative;
        filter: drop-shadow(0 0 6px rgba(255, 0, 0, 0.8));
        animation: pulse 3s infinite ease-in-out;
    }

    /* Linea verticale superiore */
    .line-top {
        position: absolute;
        bottom: 3px;
        left: 1px;
        width: 2px;
        height: 0;
        background: red;
        filter: drop-shadow(0 0 6px rgba(255, 0, 0, 0.7));
        animation: growTop 3s forwards ease-out;
    }

    /* Linea verticale inferiore */
    .line-bottom {
        position: absolute;
        top: 3px;
        left: 1px;
        width: 2px;
        height: 0;
        background: red;
        filter: drop-shadow(0 0 6px rgba(255, 0, 0, 0.7));
        animation: growBottom 3s forwards ease-out;
    }

    /* Ramificazione sinistra */
    .branch-left {
        position: absolute;
        top: 40px;
        left: -1px;
        width: 0;
        height: 2px;
        background: red;
        transform-origin: left center;
        transform: rotate(-25deg);
        filter: drop-shadow(0 0 6px rgba(255, 0, 0, 0.7));
        animation: branchLeft 2s forwards ease-out;
        animation-delay: 2.2s;
    }

    /* Ramificazione destra */
    .branch-right {
        position: absolute;
        top: -40px;
        left: 2px;
        width: 0;
        height: 2px;
        background: red;
        transform-origin: left center;
        transform: rotate(30deg);
        filter: drop-shadow(0 0 6px rgba(255, 0, 0, 0.7));
        animation: branchRight 2s forwards ease-out;
        animation-delay: 2.4s;
    }

    /* Animazioni */
    @keyframes growTop {
        from { height: 0; }
        to { height: 120px; }
    }

    @keyframes growBottom {
        from { height: 0; }
        to { height: 150px; }
    }

    @keyframes branchLeft {
        from { width: 0; }
        to { width: 80px; }
    }

    @keyframes branchRight {
        from { width: 0; }
        to { width: 100px; }
    }

    @keyframes pulse {
        0% { opacity: 0.7; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.2); }
        100% { opacity: 0.7; transform: scale(1); }
    }
</style>

</head>
<body>

<div class="origin">
    <div class="line-top"></div>
    <div class="line-bottom"></div>
    <div class="branch-left"></div>
    <div class="branch-right"></div>
</div>

</body>
</html>
