<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina 5</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .fracture {
            width: 70vh;
            opacity: 0;
            filter: drop-shadow(0 0 0px #ff0000);
            animation: draw 1.2s ease-out forwards,
                       glow 0.8s ease-out 1.2s forwards,
                       settle 0.2s ease-out 2s forwards;
        }

        @keyframes draw {
            0% { opacity: 0; stroke-dasharray: 1000; stroke-dashoffset: 1000; }
            100% { opacity: 1; stroke-dashoffset: 0; }
        }

        @keyframes glow {
            0% { filter: drop-shadow(0 0 12px #ff0000); }
            100% { filter: drop-shadow(0 0 0px #ff0000); }
        }

        @keyframes settle {
            0% { transform: translate(1px, -1px); }
            100% { transform: translate(0, 0); }
        }
    </style>
</head>

<body onclick="window.location.href='pagina6.html'">
    <img src="arcidiacono-fracture.svg" class="fracture">
</body>
</html>
