<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagina 5</title>

<style>

/* Sfondo nero */
body {
  margin: 0;
  padding: 0;
  background-color: #000;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

/* Contenitore centrale */
.fracture-wrapper {
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 1;
  animation: fadeOut 1.4s ease-in forwards;
  animation-delay: 4.2s; /* fade-out ritardato */
}

/* Fade-in iniziale dell’SVG */
.fadein {
  opacity: 0;
  animation: fadeIn 1.2s ease-out forwards;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

/* Fade-out finale del wrapper */
@keyframes fadeOut {
  to { opacity: 0; }
}

/* Base animazione stroke */
.crack {
  stroke-dasharray: 200;
  stroke-dashoffset: 200;
  animation: draw 0.7s ease-out forwards, glowPulse 3.4s ease-in-out infinite;
}

/* Disegno progressivo */
@keyframes draw {
  to { stroke-dashoffset: 0; }
}

/* Glow rosso pulsante */
@keyframes glowPulse {
  0%   { filter: drop-shadow(0 0 3px #ff0000); }
  50%  { filter: drop-shadow(0 0 9px #ff2a2a); }
  100% { filter: drop-shadow(0 0 3px #ff0000); }
}

/* Delay ramo-per-ramo */
.p0 { animation-delay: 0ms; }
.p1 { animation-delay: 120ms; }
.p2 { animation-delay: 240ms; }
.p3 { animation-delay: 360ms; }
.p4 { animation-delay: 480ms; }
.p5 { animation-delay: 600ms; }
.p6 { animation-delay: 720ms; }
.p7 { animation-delay: 840ms; }
.p8 { animation-delay: 960ms; }
.p9 { animation-delay: 1080ms; }
.p10 { animation-delay: 1200ms; }
.p11 { animation-delay: 1320ms; }
.p12 { animation-delay: 1440ms; }
.p13 { animation-delay: 1560ms; }
.p14 { animation-delay: 1680ms; }
.p15 { animation-delay: 1800ms; }
.p16 { animation-delay: 1920ms; }
.p17 { animation-delay: 2040ms; }
.p18 { animation-delay: 2160ms; }

</style>
</head>

<body>

<div class="fracture-wrapper">
  <svg class="fadein" xmlns="http://www.w3.org/2000/svg" width="70vh" viewBox="-80 -80 160 160">
    <g fill="none" stroke="#ff0000" stroke-linecap="round" stroke-linejoin="round">

      <!-- Tratto principale -->
      <path class="crack p0" d="M -55 -55 L -42 -40 L -48 -25 L -32 -12 L -38 5 L -22 18 L -30 32 L -14 44 L -20 58 L -5 68 L -10 78 L 8 86" stroke-width="4.2"/>

      <!-- Rami principali sinistra -->
      <path class="crack p1" d="M -42 -40 L -60 -38 L -70 -30" stroke-width="3.2"/>
      <path class="crack p2" d="M -32 -12 L -50 -8 L -62 2" stroke-width="3.0"/>
      <path class="crack p3" d="M -22 18 L -40 22 L -55 32" stroke-width="3.0"/>
      <path class="crack p4" d="M -14 44 L -32 50 L -46 60" stroke-width="3.0"/>
      <path class="crack p5" d="M -5 68 L -24 74 L -38 84" stroke-width="3.0"/>

      <!-- Rami principali destra -->
      <path class="crack p6" d="M -48 -25 L -34 -30 L -22 -36" stroke-width="3.0"/>
      <path class="crack p7" d="M -38 5 L -24 0 L -12 -6" stroke-width="2.8"/>
      <path class="crack p8" d="M -30 32 L -16 28 L -4 22" stroke-width="2.8"/>
      <path class="crack p9" d="M -20 58 L -6 54 L 6 48" stroke-width="2.8"/>

      <!-- Micro-crepe -->
      <path class="crack p10" d="M -52 -20 L -58 -16 L -64 -12" stroke-width="1.4"/>
      <path class="crack p11" d="M -44 10 L -50 14 L -56 18" stroke-width="1.4"/>
      <path class="crack p12" d="M -26 40 L -32 44 L -38 48" stroke-width="1.4"/>
      <path class="crack p13" d="M -12 62 L -18 66 L -24 70" stroke-width="1.4"/>
      <path class="crack p14" d="M -30 0 L -36 -4 L -42 -8" stroke-width="1.4"/>
      <path class="crack p15" d="M -18 24 L -24 20 L -30 16" stroke-width="1.4"/>

      <!-- Micro-crepe destra -->
      <path class="crack p16" d="M -36 -18 L -28 -22 L -20 -26" stroke-width="1.4"/>
      <path class="crack p17" d="M -28 14 L -20 10 L -12 6" stroke-width="1.4"/>
      <path class="crack p18" d="M -22 50 L -14 46 L -6 42" stroke-width="1.4"/>

    </g>
  </svg>
</div>

<script>
/* Redirect automatico alla Pagina 6 */
setTimeout(() => {
  window.location.href = "pagina6.html";
}, 5600); /* leggermente aumentato per sicurezza */
</script>

</body>
</html>
