<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagina 5</title>

<style>

/* Sfondo nero */
body {
  margin: 0;
  padding: 0;
  background-color: #000;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

/* Wrapper che gestisce il fade-out */
.fracture-wrapper {
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 1;
  animation: fadeOut 1.6s ease-in forwards;
  animation-delay: 4.6s;
}

/* Fade-in dell’SVG */
.fadein {
  opacity: 0;
  animation: fadeIn 1.2s ease-out forwards;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

@keyframes fadeOut {
  to { opacity: 0; }
}

/* Animazione stroke */
.crack {
  stroke-dasharray: 600;
  stroke-dashoffset: 600;
  animation: draw 1.4s ease-out forwards, glowPulse 3.6s ease-in-out infinite;
}

/* Disegno progressivo */
@keyframes draw {
  to { stroke-dashoffset: 0; }
}

/* Glow rosso */
@keyframes glowPulse {
  0%   { filter: drop-shadow(0 0 3px #ff0000); }
  50%  { filter: drop-shadow(0 0 10px #ff2a2a); }
  100% { filter: drop-shadow(0 0 3px #ff0000); }
}

/* Delay ramo-per-ramo */
.p0 { animation-delay: 0ms; }
.p1 { animation-delay: 140ms; }
.p2 { animation-delay: 280ms; }
.p3 { animation-delay: 420ms; }
.p4 { animation-delay: 560ms; }
.p5 { animation-delay: 700ms; }
.p6 { animation-delay: 840ms; }
.p7 { animation-delay: 980ms; }
.p8 { animation-delay: 1120ms; }
.p9 { animation-delay: 1260ms; }
.p10 { animation-delay: 1400ms; }
.p11 { animation-delay: 1540ms; }
.p12 { animation-delay: 1680ms; }
.p13 { animation-delay: 1820ms; }
.p14 { animation-delay: 1960ms; }
.p15 { animation-delay: 2100ms; }

</style>
</head>

<body>

<div class="fracture-wrapper">
  <svg class="fadein" xmlns="http://www.w3.org/2000/svg" width="100vw" height="100vh" viewBox="-300 -300 600 600">
    <g fill="none" stroke="#ff0000" stroke-linecap="round" stroke-linejoin="round">

      <!-- Crepa principale FULLSCREEN, sottile, centrata con deviazione leggera -->
      <path class="crack p0" d="
        M 0 -320
        L 0 -250
        L -8 -180
        L 4 -110
        L -6 -40
        L 3 20
        L -5 80
        L 6 150
        L -4 220
        L 0 300
      " stroke-width="2.2"/>

      <!-- Rami laterali sottili -->
      <path class="crack p1" d="M -8 -180 L -40 -160 L -70 -150" stroke-width="1.4"/>
      <path class="crack p2" d="M 4 -110 L 30 -90 L 55 -70" stroke-width="1.4"/>
      <path class="crack p3" d="M -6 -40 L -28 -20 L -50 -5" stroke-width="1.4"/>
      <path class="crack p4" d="M 3 20 L 26 40 L 48 55" stroke-width="1.4"/>
      <path class="crack p5" d="M -5 80 L -32 100 L -58 120" stroke-width="1.4"/>
      <path class="crack p6" d="M 6 150 L 34 170 L 60 190" stroke-width="1.4"/>
      <path class="crack p7" d="M -4 220 L -28 240 L -52 260" stroke-width="1.4"/>

      <!-- Micro-crepe -->
      <path class="crack p8" d="M 0 -250 L 18 -260" stroke-width="1.0"/>
      <path class="crack p9" d="M -8 -180 L -20 -190" stroke-width="1.0"/>
      <path class="crack p10" d="M 4 -110 L 18 -118" stroke-width="1.0"/>
      <path class="crack p11" d="M -6 -40 L -18 -48" stroke-width="1.0"/>
      <path class="crack p12" d="M 3 20 L 16 12" stroke-width="1.0"/>
      <path class="crack p13" d="M -5 80 L -18 72" stroke-width="1.0"/>
      <path class="crack p14" d="M 6 150 L 20 142" stroke-width="1.0"/>
      <path class="crack p15" d="M -4 220 L -18 212" stroke-width="1.0"/>

    </g>
  </svg>
</div>

<script>
/* Redirect alla Pagina 6 */
setTimeout(() => {
  window.location.href = "pagina6.html";
}, 6000);
</script>

</body>
</html>
