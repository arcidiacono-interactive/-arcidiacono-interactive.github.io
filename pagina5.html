<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagina 5</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background-color: #000000;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }

    svg {
        width: 400px;
        height: 400px;
        overflow: visible;
        animation: breathe 3.8s ease-in-out infinite;
    }

    .crack-main,
    .crack-branch,
    .crack-noise {
        fill: none;
        stroke: #ff0000;
        stroke-width: 2.3;
        stroke-linecap: round;
        stroke-linejoin: round;
        filter: drop-shadow(0 0 14px rgba(255, 0, 0, 1));
        stroke-dasharray: 700;
        stroke-dashoffset: 700;
        animation: draw 3.8s ease-out forwards;
    }

    .crack-branch {
        stroke-width: 2;
        stroke-dasharray: 350;
        stroke-dashoffset: 350;
        animation: draw 3s ease-out forwards;
    }

    .crack-noise {
        stroke-width: 1.2;
        opacity: 0.75;
        stroke-dasharray: 200;
        stroke-dashoffset: 200;
        animation: draw 3.2s ease-out forwards;
    }

    /* Rami principali */
    .branch-1 { animation-delay: 2.0s; }
    .branch-2 { animation-delay: 2.3s; }
    .branch-3 { animation-delay: 2.6s; }
    .branch-4 { animation-delay: 2.9s; }
    .branch-5 { animation-delay: 3.1s; }

    /* Micro-crepe */
    .noise-1 { animation-delay: 1.2s; }
    .noise-2 { animation-delay: 1.5s; }
    .noise-3 { animation-delay: 1.8s; }
    .noise-4 { animation-delay: 2.0s; }
    .noise-5 { animation-delay: 2.2s; }
    .noise-6 { animation-delay: 2.4s; }
    .noise-7 { animation-delay: 2.6s; }
    .noise-8 { animation-delay: 2.8s; }
    .noise-9 { animation-delay: 3.0s; }
    .noise-10 { animation-delay: 3.2s; }
    .noise-11 { animation-delay: 3.4s; }
    .noise-12 { animation-delay: 3.6s; }

    .origin-pulse {
        fill: #ff0000;
        filter: drop-shadow(0 0 16px rgba(255, 0, 0, 1));
        animation: pulse 3s infinite ease-in-out;
    }

    @keyframes draw {
        from { stroke-dashoffset: 700; }
        to { stroke-dashoffset: 0; }
    }

    @keyframes breathe {
        0% { transform: scale(1); }
        50% { transform: scale(1.02); }
        100% { transform: scale(1); }
    }

    @keyframes pulse {
        0% { transform: scale(1); opacity: 0.6; }
        50% { transform: scale(1.7); opacity: 1; }
        100% { transform: scale(1); opacity: 0.6; }
    }
</style>

</head>
<body>

<svg viewBox="-60 -200 120 400">

    <!-- Punto di origine -->
    <circle class="origin-pulse" cx="0" cy="0" r="1" />

    <!-- Crepa principale (torsione verso sinistra) -->
    <path class="crack-main" d="
        M 0 0
        L -4 -10
        L 3 -22
        L -8 -35
        L 5 -50
        L -10 -66
        L 4 -83
        L -12 -101
        L 6 -120
        L -14 -140
        L 5 -162
        L -12 -185
        L 4 -210

        M 0 0
        L -5 12
        L 4 25
        L -9 40
        L 6 56
        L -11 73
        L 5 91
        L -13 110
        L 6 130
        L -12 152
        L 4 175
        L -10 198
        L 3 220
    " />

    <!-- 5 RAMI PRINCIPALI (sbilanciati verso sinistra) -->
    <path class="crack-branch branch-1" d="M 0 -60 L -12 -70 L -20 -82 L -28 -95 L -35 -110 L -40 -125" />
    <path class="crack-branch branch-2" d="M 0 65 L -10 78 L -18 92 L -26 108 L -33 125 L -38 142" />
    <path class="crack-branch branch-3" d="M 0 -30 L -14 -40 L -22 -52 L -30 -65" />
    <path class="crack-branch branch-4" d="M 0 30 L -12 42 L -20 55 L -27 70" />
    <path class="crack-branch branch-5" d="M 0 -100 L -16 -115 L -25 -130 L -33 -147" />

    <!-- 12 MICRO-CREPE (tutte sbilanciate verso sinistra) -->
    <path class="crack-noise noise-1" d="M -5 -85 L -10 -90 L -15 -95" />
    <path class="crack-noise noise-2" d="M -8 -145 L -14 -150 L -20 -155" />
    <path class="crack-noise noise-3" d="M -6 110 L -12 115 L -18 120" />
    <path class="crack-noise noise-4" d="M -4 50 L -9 55 L -14 60" />
    <path class="crack-noise noise-5" d="M -6 -45 L -12 -50 L -18 -55" />
    <path class="crack-noise noise-6" d="M -10 150 L -16 155 L -22 160" />
    <path class="crack-noise noise-7" d="M -7 -120 L -14 -125 L -20 -130" />
    <path class="crack-noise noise-8" d="M -3 20 L -8 25 L -13 30" />
    <path class="crack-noise noise-9" d="M -12 -10 L -18 -15 L -24 -20" />
    <path class="crack-noise noise-10" d="M -15 -25 L -21 -30 L -27 -35" />
    <path class="crack-noise noise-11" d="M -10 80 L -16 85 L -22 90" />
    <path class="crack-noise noise-12" d="M -14 95 L -20 100 L -26 105" />

</svg>

</body>
</html>
