<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">

    <!-- ANTI-CACHE -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina 2</title>

    <link rel="stylesheet" href="pagina2_omega_final.css?v=2">

    <style>
        /* Pulsante CONTINUA */
        .skip-btn {
            opacity: 0;
            position: fixed;
            bottom: 4vh;
            left: 50%;
            transform: translateX(-50%);
            padding: 0.6rem 1.4rem;
            border: 1px solid #f5f5f5;
            color: #f5f5f5;
            background: transparent;
            font-family: "Montserrat", sans-serif;
            font-size: 1rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .skip-btn:hover {
            background: #f5f5f5;
            color: #000;
        }

        /* Fade-in del pulsante */
        .show-btn {
            animation: fadeBtn 1.2s ease forwards;
        }

        @keyframes fadeBtn {
            0% { opacity: 0; transform: translate(-50%, 10px); }
            100% { opacity: 1; transform: translate(-50%, 0); }
        }
    </style>
</head>

<body>

    <div class="omegaWrapper">
        <div class="fraseOmega">Every story has its fractures.</div>
        <div class="fraseOmegaIta">Ogni storia ha le sue fratture.</div>
    </div>

    <!-- Pulsante CONTINUA -->
    <button id="skip" class="skip-btn" onclick="goNext()">CONTINUA</button>

    <script>
        // Mostra il pulsante dopo 3 secondi
        setTimeout(() => {
            document.getElementById("skip").classList.add("show-btn");
        }, 3000);

        // Redirect automatico dopo 10 secondi
        setTimeout(() => {
            goNext();
        }, 10000);

        function goNext() {
            window.location.href = "pagina3.html?v=" + Date.now();
        }
    </script>

</body>
</html>
