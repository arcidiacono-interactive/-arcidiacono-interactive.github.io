<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagina 6</title>

<style>

/* Reset + sfondo */
body {
  margin: 0;
  padding: 0;
  background: #000;
  color: #fff;
  font-family: "Montserrat", sans-serif;
  overflow: hidden;
}

/* Grana cinematografica */
body::before {
  content: "";
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  background-image: url("https://www.transparenttextures.com/patterns/asfalt-dark.png");
  opacity: 0.12;
  z-index: 1;
}

/* Vignettatura D-SOFT + eco rossa iniziale */
body::after {
  content: "";
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  background:
    radial-gradient(circle, rgba(255,0,0,0.12) 0%, rgba(0,0,0,0.55) 70%);
  animation: vignetteFade 10s ease-out forwards, breathe 16s ease-in-out infinite;
  z-index: 2;
}

/* L’eco rossa svanisce lentamente */
@keyframes vignetteFade {
  0%   { opacity: 1; }
  100% { opacity: 0.55; }
}

/* Vignettatura che respira */
@keyframes breathe {
  0%   { opacity: 0.55; }
  50%  { opacity: 0.68; }
  100% { opacity: 0.55; }
}

/* Contenitore centrale */
.center {
  position: relative;
  z-index: 3;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

/* Logo */
.logo {
  font-size: 4rem;
  letter-spacing: 4px;
  font-weight: 700;
  margin-bottom: 25px;
  text-transform: uppercase;
  opacity: 0;
  animation: fadeIn 1.8s ease-out forwards;
}

/* Frase bilingue (EN grande, IT sotto) */
.phrase-en {
  font-size: 1.4rem;
  opacity: 0;
  margin-bottom: 6px;
  animation: fadeIn 2.4s ease-out forwards;
  animation-delay: 0.4s;
}

.phrase-it {
  font-size: 0.95rem;
  opacity: 0;
  margin-bottom: 40px;
  animation: fadeIn 2.4s ease-out forwards;
  animation-delay: 0.8s;
}

/* Menu */
.menu {
  display: flex;
  gap: 28px;
  font-size: 0.9rem;
  opacity: 0;
  animation: fadeIn 2.4s ease-out forwards;
  animation-delay: 1.2s;
}

.menu a {
  color: #fff;
  text-decoration: none;
  transition: opacity 0.3s;
}

.menu a:hover {
  opacity: 1;
}

/* Fade-in generico */
@keyframes fadeIn {
  to { opacity: 1; }
}

</style>
</head>

<body>

<div class="center">

  <!-- LOGO -->
  <div class="logo">ARCIDIACONO INTERACTIVE</div>

  <!-- FRASE BILINGUE -->
  <div class="phrase-en">After the fracture, a rebirth always follows.</div>
  <div class="phrase-it">Dopo la crepa, segue sempre una rinascita.</div>

  <!-- MENU -->
  <div class="menu">
    <a href="about.html">ABOUT</a>
    <a href="team.html">TEAM</a>
    <a href="presskit.html">PRESS KIT</a>
    <a href="devlog.html">DEVLOG</a>
    <a href="roadmap.html">ROADMAP</a>
    <a href="social.html">SOCIAL HUB</a>
    <a href="legal.html">LEGAL</a>
  </div>

</div>

</body>
</html>
